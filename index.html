<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nt</title>
    <link href="assets/css/output.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="/favicon.ico" />

</head>

<body>
    <header class="p-8 w-full max-w-5xl mx-auto">
        <nav class="flex justify-center md:justify-between items-center">
            <img src="assets/img/logos/nwb.svg" alt="Logo" class="flex h-12 md:h-24">
        </nav>
    </header>

    <main class="flex flex-col w-full max-w-5xl mx-auto flex-1">
        <section class="px-8 pb-8 pt-0 flex flex-col w-full">


            <!-- terminal -->
            <div id="terminal">
                <div id="titlebar">
                    <div class="dot" style="background:#505050"></div>
                    <div class="dot" style="background:#404040"></div>
                    <div class="dot" style="background:#202020"></div>
                    <span>nate@portfolio ~ </span>
                </div>
                <div id="output"></div>
                <div id="input-row" class="border-t border-neutral-800">
                    <span id="prompt">nate@portfolio:~$</span>
                    <input id="cmd-input" type="text" autocomplete="off" spellcheck="false" autofocus
                        placeholder="type a command...">
                </div>
            </div>


        </section>
    </main>


    <script src="assets/js/main.js"></script>
</body>

</html>
